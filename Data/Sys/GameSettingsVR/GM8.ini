# Fixes the double-vision area-name cards. Those screens are a single
# full-screen orthographic quad (left 0, right 640, top 448, bottom 0) classified as Unknown2D,
# which IsWorldLayer treats as world content. With the virtual screen off and no override it
# inherits a stale per-eye stereo flag and is emitted mono into both eyes, so the detailed
# text lands at divergent angles on the Quest's asymmetric per-eye frustums and won't fuse.
# handling=headlocked puts the card on the head-fixed virtual screen (the unrotated head_proj
# path), the same one the HUD/visor/helmet overlays already fuse through. handling=screen was
# tried first but did NOT fuse on-device: that path uses the rotated eye_proj (world-fixed), so a
# near full-screen card carries too much world parallax between the eyes. Matched by ortho metrics
# only (x100); uniform full-screen fades/tints use the centred -320..320 metrics, left untouched.
$Metroid Fullscreen 2D Card Stereo
format=element_only_v5
handling=headlocked
sig_perspective=0
sig_use_projection=1
sig_ortho_left=0
sig_ortho_right=64000
sig_ortho_top=44800
sig_ortho_bottom=0
sig_use_layer=0
sig_use_viewport=0
sig_use_scissor=0
sig_use_render_state=0
